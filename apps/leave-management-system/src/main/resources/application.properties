spring.application.name=leave-management-system

# Server Configuration
server.port=9000

# Database Configuration (H2)
spring.r2dbc.url=r2dbc:h2:mem:///leave_management_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.r2dbc.username=sa
spring.r2dbc.password=

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.java.leave.management.system=DEBUG

# JWT Configuration
app.jwtSecret=${JWT_SECRET:mySecretKeyForLeaveManagementSystem}
app.jwtExpirationInMs=${JWT_EXPIRATION:864000}

# Application Configuration
app.leave-management.base-path=/api/v1/leave-management

# Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# http://localhost:9000/webjars/swagger-ui/index.html
