spring:
  application:
    name: leave-management-system
  r2dbc:
    url: r2dbc:postgresql://localhost/postgres
    username: postgres
    password: password
    # Note: R2DBC pools are configured differently and don't typically use the 'pool' properties shown.



server:
  port: 9000
  servlet:
    context-path: /leave-management

# Application Configuration
app:
  leave-management.base-path: /api/v1
  jwtSecret: ${JWT_SECRET:mySecretKeyForLeaveManagementSystem}
  jwtExpirationInMs: ${JWT_EXPIRATION:864000}

# Swagger Configuration
springdoc:
  api-docs.path: /v3/api-docs
  swagger-ui.path: /swagger-ui.html

# http://localhost:9000/webjars/swagger-ui/index.html

logging:
  level:
    org.springframework.r2dbc: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    web: INFO
    org.springframework.security: DEBUG
    com.java.leave.management.system: DEBUG