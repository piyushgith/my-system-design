spring.application.name=banking-core-service

# PostgreSQL (default / dev)
spring.datasource.url=jdbc:postgresql://localhost:5432/banking_core
spring.datasource.username=banking
spring.datasource.password=banking
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

banking.ledger.clearing-gl-code=GL-NEFT-IN
banking.security.dev-mode=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info
