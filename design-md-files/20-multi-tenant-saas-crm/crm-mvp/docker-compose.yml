version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres
    environment:
      POSTGRES_DB: crmdb
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm_secret
    ports:
      - "5432:5432"
    volumes:
      - crm_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crmdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: crm-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/crmdb
      SPRING_DATASOURCE_USERNAME: crm
      SPRING_DATASOURCE_PASSWORD: crm_secret
      JWT_SECRET: change-me-in-production-use-at-least-256-bits
      JWT_EXPIRATION_MS: 900000
    ports:
      - "8080:8080"

volumes:
  crm_pg_data:
