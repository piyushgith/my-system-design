spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/crmdb
    username: crm
    password: crm_secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: change-me-in-production-use-at-least-256-bits
  expiration-ms: 900000   # 15 minutes

logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%p","logger":"%logger{36}","message":"%msg","correlation_id":"%X{correlationId}"}%n'
  level:
    io.crm: DEBUG
    org.springframework.security: INFO
