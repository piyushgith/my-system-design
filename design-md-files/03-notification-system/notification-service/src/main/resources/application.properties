spring.application.name=notification-service
server.port=8080

# ── H2 (default / dev) ──────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:notificationdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA ─────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# ── Flyway (disabled for H2 dev; enabled per postgres profile) ───────────────
spring.flyway.enabled=false

# ── Redis ────────────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# ── Kafka ────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.test.notification.kafka.event
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.test.notification.kafka.event.NotificationRequestedEvent

# ── Kafka Topics ─────────────────────────────────────────────────────────────
app.kafka.topics.notification-requested=notification.requested
app.kafka.topics.email-dispatch=email.dispatch
app.kafka.topics.delivery-result=delivery.result
app.kafka.topics.email-dlt=email.dispatch.DLT

# ── Retry ────────────────────────────────────────────────────────────────────
app.retry.max-attempts=3
app.retry.initial-interval-ms=1000
app.retry.multiplier=2.0

# ── Idempotency ───────────────────────────────────────────────────────────────
app.idempotency.ttl-hours=24

# ── Cache TTLs ────────────────────────────────────────────────────────────────
app.cache.preference-ttl-minutes=60
app.cache.template-ttl-hours=24

# ── Email Provider ────────────────────────────────────────────────────────────
app.email.provider=mock
app.email.sendgrid.api-key=${SENDGRID_API_KEY:mock-key}
app.email.from-address=noreply@example.com

# ── Outbox Relay ─────────────────────────────────────────────────────────────
app.outbox.poll-interval-ms=200
app.outbox.batch-size=100

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
