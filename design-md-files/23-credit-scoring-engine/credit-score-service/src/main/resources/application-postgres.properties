# PostgreSQL 17 datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/creditscoredb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=credituser
spring.datasource.password=creditpass

# HikariCP — sized for single-node MVP; raise max-pool-size under load
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=CreditScorePool

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway — PostgreSQL-native migrations (JSONB, UUID, TIMESTAMPTZ)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/postgresql
spring.flyway.baseline-on-migrate=false

# H2 console off in postgres profile
spring.h2.console.enabled=false
