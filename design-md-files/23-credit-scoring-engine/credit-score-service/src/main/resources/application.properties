spring.application.name=credit-score-service

# H2 in-memory (dev) — swap datasource url for PostgreSQL in prod
spring.datasource.url=jdbc:h2:mem:creditscoredb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis — graceful connect failure handled in code; service still works without Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.connect-timeout=500ms
spring.data.redis.timeout=500ms

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Scoring config
app.scoring.challenger-traffic-pct=10
app.scoring.score-cache-ttl-minutes=5
app.scoring.idempotency-ttl-hours=24
