spring.application.name=url-shortner-service

spring.datasource.url=jdbc:postgresql://localhost:5432/urlshortener
spring.datasource.username=urlshortener
spring.datasource.password=urlshortener
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

spring.data.redis.host=localhost
spring.data.redis.port=6379

app.short-url.base-domain=http://localhost:8080
app.short-url.code-length=7
app.cache.url-ttl-hours=24

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
