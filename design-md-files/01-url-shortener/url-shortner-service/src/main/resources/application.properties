spring.application.name=url-shortner-service

spring.datasource.url=jdbc:postgresql://localhost:5432/sysyemdesign
spring.datasource.username=system
spring.datasource.password=design
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.default_schema=urlschema
spring.jpa.show-sql=false

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=urlschema
spring.flyway.default-schema=urlschema

spring.data.redis.host=localhost
spring.data.redis.port=6379

app.short-url.base-domain=http://localhost:8080
app.short-url.code-length=7
app.cache.url-ttl-hours=24

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
