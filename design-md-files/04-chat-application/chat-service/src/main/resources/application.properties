spring.application.name=chat-service
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5433/chat
spring.datasource.username=chat
spring.datasource.password=chat
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.data.redis.host=localhost
spring.data.redis.port=6380

chat.jwt.secret=change-me-in-production-use-at-least-256-bit-secret-key-here
chat.jwt.expiration-hours=24
chat.mvp.max-group-members=20

management.endpoints.web.exposure.include=health,info
