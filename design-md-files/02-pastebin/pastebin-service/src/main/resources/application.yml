spring:
  application:
    name: pastebin-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/pastebin_dev
    username: pastebin
    password: pastebin
    hikari:
      maximum-pool-size: 20
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: paste
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: paste,identity
    default-schema: paste
    create-schemas: true
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false
    clean-disabled: true
  data:
    redis:
      host: localhost
      port: 6379
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

pastebin:
  base-url: http://localhost:8080
  content:
    inline-threshold-bytes: 1024
    max-size-bytes: 10485760
  s3:
    bucket: pastebin-content
    region: us-east-1
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    path-style-access: true
  jwt:
    secret: ${JWT_SECRET:pastebin-dev-secret-change-in-production-must-be-256-bits-long!!}
    expiration-ms: 86400000
  rate-limit:
    anonymous-create-per-hour: 10
    anonymous-read-per-minute: 100
    authenticated-create-per-day: 100
  cache:
    negative-ttl-seconds: 60
    max-never-expire-ttl-seconds: 86400

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} traceId=%X{traceId} - %msg%n"
