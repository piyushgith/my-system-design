# Standalone Flyway CLI config (optional — scripts use Maven plugin by default)
flyway.url=jdbc:postgresql://localhost:5432/pastebin_dev
flyway.user=pastebin
flyway.password=pastebin
flyway.schemas=paste,identity
flyway.defaultSchema=paste
flyway.createSchemas=true
flyway.locations=filesystem:src/main/resources/db/migration
flyway.baselineOnMigrate=true
flyway.validateOnMigrate=true
flyway.cleanDisabled=true
