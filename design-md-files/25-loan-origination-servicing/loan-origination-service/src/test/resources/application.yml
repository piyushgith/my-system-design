spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false   # use JPA schema generation in tests

app:
  jwt:
    secret: test-secret-key-at-least-256-bits-long-for-hmac-sha-algorithm
    expiration-ms: 3600000
